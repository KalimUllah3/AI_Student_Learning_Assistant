<!DOCTYPE html>
<html>
<head>
    <title>Ask Question</title>
</head>
<body>

<h2>{{ document.title }}</h2>

<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}

    <button type="submit">
        Ask
    </button>
</form>

{% if answer %}

<h3>Answer</h3>

<p>{{ answer }}</p>

{% endif %}

</body>
</html>
