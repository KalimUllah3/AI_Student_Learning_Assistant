<!DOCTYPE html>
<html>
<head>
    <title>My Documents</title>
</head>
<body>
<h2>My Documents</h2>
<ul>
{% for document in documents %}
    <li>
        {{ document.title }}
        <br>
        <a href="{% url 'ask_question' document.id %}">
            Ask Questions
        </a>
        <br>
        <a href="{% url 'generate_quiz' document.id %}">
            Generate Quiz
        </a>
    </li>
    <hr>
{% empty %}
    <li>No documents uploaded yet.</li>
{% endfor %}
</ul>
</body>
</html>
