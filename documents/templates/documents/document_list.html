<!DOCTYPE html>
<html>
<head>
    <title>My Documents</title>
</head>
<body>

<h2>My Documents</h2>

<ul>
    {% for document in documents %}
        <li>
            {{ document.title }}
        </li>
    {% empty %}
        <li>No documents uploaded yet.</li>
    {% endfor %}
</ul>

</body>
</html>
